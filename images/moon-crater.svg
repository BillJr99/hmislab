<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#080820"/>

  <!-- Stars -->
  <g fill="white" opacity="0.7">
    <circle cx="30"  cy="20"  r="1.2"/>
    <circle cx="80"  cy="45"  r="0.8"/>
    <circle cx="150" cy="15"  r="1.0"/>
    <circle cx="220" cy="30"  r="0.9"/>
    <circle cx="300" cy="10"  r="1.2"/>
    <circle cx="370" cy="40"  r="0.8"/>
    <circle cx="350" cy="80"  r="1.0"/>
    <circle cx="20"  cy="90"  r="0.9"/>
    <circle cx="60"  cy="130" r="0.8"/>
    <circle cx="380" cy="150" r="1.1"/>
    <circle cx="10"  cy="200" r="0.9"/>
    <circle cx="390" cy="220" r="0.8"/>
    <circle cx="30"  cy="260" r="1.0"/>
    <circle cx="370" cy="270" r="0.9"/>
  </g>

  <!-- Moon body -->
  <radialGradient id="moonGrad" cx="40%" cy="35%" r="60%">
    <stop offset="0%" stop-color="#e0e0d0"/>
    <stop offset="60%" stop-color="#b0b0a0"/>
    <stop offset="100%" stop-color="#808070"/>
  </radialGradient>
  <circle cx="200" cy="155" r="130" fill="url(#moonGrad)"/>

  <!-- Large craters -->
  <ellipse cx="160" cy="120" rx="38" ry="32" fill="none" stroke="#9090808" stroke-width="0"/>
  <ellipse cx="160" cy="120" rx="38" ry="32" fill="#a0a090" opacity="0.5"/>
  <ellipse cx="162" cy="118" rx="30" ry="24" fill="#c8c8b8" opacity="0.4"/>

  <ellipse cx="250" cy="180" rx="28" ry="24" fill="#a0a090" opacity="0.45"/>
  <ellipse cx="252" cy="178" rx="20" ry="17" fill="#c8c8b8" opacity="0.35"/>

  <ellipse cx="175" cy="200" rx="20" ry="16" fill="#989890" opacity="0.5"/>
  <ellipse cx="176" cy="199" rx="14" ry="11" fill="#c4c4b4" opacity="0.35"/>

  <!-- Small craters -->
  <circle cx="215" cy="110" r="12" fill="#a0a090" opacity="0.4"/>
  <circle cx="216" cy="109" r="8"  fill="#ccc" opacity="0.25"/>
  <circle cx="130" cy="175" r="9"  fill="#a0a090" opacity="0.4"/>
  <circle cx="280" cy="130" r="7"  fill="#a0a090" opacity="0.35"/>
  <circle cx="200" cy="240" r="10" fill="#a0a090" opacity="0.4"/>
  <circle cx="230" cy="220" r="6"  fill="#a0a090" opacity="0.35"/>
  <circle cx="145" cy="155" r="5"  fill="#a0a090" opacity="0.3"/>

  <!-- Terminator shadow (right edge) -->
  <clipPath id="moonClip">
    <circle cx="200" cy="155" r="130"/>
  </clipPath>
  <ellipse cx="280" cy="155" rx="60" ry="130" fill="rgba(0,0,0,0.15)" clip-path="url(#moonClip)"/>

  <!-- Label -->
  <text x="200" y="290" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888">Lunar Surface — Crater Detection</text>
</svg>
