<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0d1b2a"/>

  <!-- Grid lines -->
  <g stroke="#1a3a5c" stroke-width="0.5">
    <line x1="0" y1="75"  x2="400" y2="75"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="0" y1="225" x2="400" y2="225"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
  </g>

  <!-- ECG trace: flat baseline, P wave, QRS complex, T wave, repeat -->
  <polyline
    fill="none"
    stroke="#00d084"
    stroke-width="2.5"
    stroke-linejoin="round"
    stroke-linecap="round"
    points="
      0,150
      20,150
      30,143
      40,150
      55,150
      60,165
      65,40
      70,175
      75,150
      95,150
      110,135
      125,150
      140,150
      150,143
      160,150
      175,150
      180,165
      185,40
      190,175
      195,150
      215,150
      230,135
      245,150
      260,150
      270,143
      280,150
      295,150
      300,165
      305,40
      310,175
      315,150
      335,150
      350,135
      365,150
      400,150
    "
  />

  <!-- Label -->
  <text x="20" y="290" fill="#00d084" font-family="monospace" font-size="13" opacity="0.7">ECG — Sinus Rhythm</text>
</svg>
