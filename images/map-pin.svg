<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#e8f4f8"/>

  <!-- Map background grid (street-map style) -->
  <g stroke="#ccd" stroke-width="6" opacity="0.6">
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="80" y1="0" x2="80" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="320" y1="0" x2="320" y2="300"/>
  </g>

  <!-- Map blocks -->
  <rect x="90" y="90" width="100" height="60" rx="3" fill="#d4e6c3" stroke="#b8d4a0" stroke-width="1"/>
  <rect x="210" y="90" width="100" height="60" rx="3" fill="#d4e6c3" stroke="#b8d4a0" stroke-width="1"/>
  <rect x="90" y="170" width="100" height="60" rx="3" fill="#d4e6c3" stroke="#b8d4a0" stroke-width="1"/>
  <rect x="210" y="170" width="60" height="60" rx="3" fill="#f0e4d0" stroke="#d0c0a0" stroke-width="1"/>
  <rect x="285" y="170" width="25" height="60" rx="3" fill="#d4e6c3" stroke="#b8d4a0" stroke-width="1"/>

  <!-- Map pin -->
  <g transform="translate(200,145)">
    <!-- Shadow -->
    <ellipse cx="0" cy="68" rx="14" ry="5" fill="rgba(0,0,0,0.2)"/>
    <!-- Pin body -->
    <path d="M0,-60 C-28,-60 -28,-20 -28,0 C-28,28 0,68 0,68 C0,68 28,28 28,0 C28,-20 28,-60 0,-60 Z"
          fill="#e53935" stroke="#b71c1c" stroke-width="2"/>
    <!-- Inner circle -->
    <circle cx="0" cy="-10" r="16" fill="white" opacity="0.9"/>
    <!-- Dot -->
    <circle cx="0" cy="-10" r="8" fill="#e53935"/>
  </g>

  <!-- Campus label -->
  <text x="200" y="285" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#555">Campus Location Services</text>
</svg>
