<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0f2033"/>

  <!-- WiFi arcs centered around (200,170) -->
  <!-- Outer arc -->
  <path d="M 70,170 A 130,130 0 0,1 330,170"
        fill="none" stroke="#29b6f6" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <!-- Middle arc -->
  <path d="M 110,170 A 90,90 0 0,1 290,170"
        fill="none" stroke="#29b6f6" stroke-width="10" stroke-linecap="round" opacity="0.85"/>
  <!-- Inner arc -->
  <path d="M 150,170 A 50,50 0 0,1 250,170"
        fill="none" stroke="#29b6f6" stroke-width="10" stroke-linecap="round" opacity="0.9"/>

  <!-- Center dot -->
  <circle cx="200" cy="170" r="12" fill="#29b6f6"/>

  <!-- Lock icon (overlay to show encryption) -->
  <g transform="translate(280,50)">
    <!-- Lock body -->
    <rect x="-28" y="-10" width="56" height="46" rx="6" fill="#ffd54f" stroke="#f9a825" stroke-width="2"/>
    <!-- Lock shackle -->
    <path d="M-16,-10 L-16,-28 A16,16 0 0,1 16,-28 L16,-10"
          fill="none" stroke="#f9a825" stroke-width="5" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="0" cy="16" r="7" fill="#f9a825"/>
    <rect x="-4" y="16" width="8" height="10" rx="2" fill="#f9a825"/>
  </g>

  <!-- Signal lines emanating outward -->
  <g stroke="#29b6f6" stroke-width="1" opacity="0.3">
    <line x1="200" y1="40"  x2="200" y2="10"/>
    <line x1="260" y1="60"  x2="290" y2="30"/>
    <line x1="310" y1="110" x2="345" y2="90"/>
    <line x1="140" y1="60"  x2="110" y2="30"/>
    <line x1="90"  y1="110" x2="55"  y2="90"/>
  </g>

  <!-- Label -->
  <text x="200" y="235" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#29b6f6">Wireless Network</text>
  <text x="200" y="255" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#f9a825">Encrypted &amp; Secure</text>

  <!-- Nodes on outer perimeter -->
  <circle cx="70"  cy="170" r="8" fill="#29b6f6" opacity="0.7"/>
  <circle cx="330" cy="170" r="8" fill="#29b6f6" opacity="0.7"/>
  <circle cx="200" cy="40"  r="8" fill="#29b6f6" opacity="0.7"/>
</svg>
