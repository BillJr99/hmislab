<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#fafafa"/>

  <!-- Level 0: root -->
  <rect x="155" y="18" width="90" height="36" rx="8" fill="#4472c4" stroke="#2f5597" stroke-width="1.5"/>
  <text x="200" y="40" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white">Feature A ≤ 3?</text>

  <!-- Branches level 0→1 -->
  <line x1="170" y1="54" x2="105" y2="100" stroke="#555" stroke-width="1.5"/>
  <line x1="230" y1="54" x2="295" y2="100" stroke="#555" stroke-width="1.5"/>
  <text x="128" y="82" font-family="sans-serif" font-size="10" fill="#27ae60">Yes</text>
  <text x="248" y="82" font-family="sans-serif" font-size="10" fill="#e74c3c">No</text>

  <!-- Level 1 left -->
  <rect x="60" y="100" width="90" height="36" rx="8" fill="#ed7d31" stroke="#c05700" stroke-width="1.5"/>
  <text x="105" y="122" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white">Feature B ≤ 5?</text>

  <!-- Level 1 right -->
  <rect x="250" y="100" width="90" height="36" rx="8" fill="#ed7d31" stroke="#c05700" stroke-width="1.5"/>
  <text x="295" y="122" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white">Feature C ≤ 7?</text>

  <!-- Branches 1→2 left -->
  <line x1="80" y1="136" x2="50" y2="186" stroke="#555" stroke-width="1.5"/>
  <line x1="130" y1="136" x2="160" y2="186" stroke="#555" stroke-width="1.5"/>
  <text x="50" y="168" font-family="sans-serif" font-size="10" fill="#27ae60">Yes</text>
  <text x="136" y="168" font-family="sans-serif" font-size="10" fill="#e74c3c">No</text>

  <!-- Branches 1→2 right -->
  <line x1="270" y1="136" x2="240" y2="186" stroke="#555" stroke-width="1.5"/>
  <line x1="320" y1="136" x2="350" y2="186" stroke="#555" stroke-width="1.5"/>
  <text x="236" y="168" font-family="sans-serif" font-size="10" fill="#27ae60">Yes</text>
  <text x="328" y="168" font-family="sans-serif" font-size="10" fill="#e74c3c">No</text>

  <!-- Level 2 leaves -->
  <rect x="15" y="186" width="70" height="32" rx="6" fill="#70ad47" stroke="#507e32"/>
  <text x="50" y="206" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">Class A</text>

  <rect x="125" y="186" width="70" height="32" rx="6" fill="#c00000" stroke="#900"/>
  <text x="160" y="206" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">Class B</text>

  <rect x="205" y="186" width="70" height="32" rx="6" fill="#70ad47" stroke="#507e32"/>
  <text x="240" y="206" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">Class A</text>

  <rect x="315" y="186" width="70" height="32" rx="6" fill="#c00000" stroke="#900"/>
  <text x="350" y="206" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="white">Class B</text>

  <!-- Sub-branch from Class A left -->
  <line x1="50" y1="218" x2="50" y2="256" stroke="#555" stroke-width="1.2"/>
  <rect x="15" y="256" width="70" height="30" rx="5" fill="#a9d18e" stroke="#507e32"/>
  <text x="50" y="275" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#1a3a1a">Leaf: A₁</text>

  <line x1="160" y1="218" x2="160" y2="256" stroke="#555" stroke-width="1.2"/>
  <rect x="125" y="256" width="70" height="30" rx="5" fill="#ff9999" stroke="#900"/>
  <text x="160" y="275" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#3a0000">Leaf: B₁</text>

  <!-- Title -->
  <text x="200" y="295" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">Decision Tree Classifier</text>
</svg>
