<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a1a2e"/>

  <!-- connections input->h1 -->
  <g stroke="#4a90d9" stroke-width="0.8" opacity="0.4">
    <line x1="70" y1="80"  x2="155" y2="60"/>
    <line x1="70" y1="80"  x2="155" y2="110"/>
    <line x1="70" y1="80"  x2="155" y2="160"/>
    <line x1="70" y1="80"  x2="155" y2="210"/>
    <line x1="70" y1="150" x2="155" y2="60"/>
    <line x1="70" y1="150" x2="155" y2="110"/>
    <line x1="70" y1="150" x2="155" y2="160"/>
    <line x1="70" y1="150" x2="155" y2="210"/>
    <line x1="70" y1="220" x2="155" y2="60"/>
    <line x1="70" y1="220" x2="155" y2="110"/>
    <line x1="70" y1="220" x2="155" y2="160"/>
    <line x1="70" y1="220" x2="155" y2="210"/>
  </g>

  <!-- connections h1->h2 -->
  <g stroke="#9b59b6" stroke-width="0.8" opacity="0.4">
    <line x1="165" y1="60"  x2="245" y2="60"/>
    <line x1="165" y1="60"  x2="245" y2="120"/>
    <line x1="165" y1="60"  x2="245" y2="180"/>
    <line x1="165" y1="60"  x2="245" y2="240"/>
    <line x1="165" y1="110" x2="245" y2="60"/>
    <line x1="165" y1="110" x2="245" y2="120"/>
    <line x1="165" y1="110" x2="245" y2="180"/>
    <line x1="165" y1="110" x2="245" y2="240"/>
    <line x1="165" y1="160" x2="245" y2="60"/>
    <line x1="165" y1="160" x2="245" y2="120"/>
    <line x1="165" y1="160" x2="245" y2="180"/>
    <line x1="165" y1="160" x2="245" y2="240"/>
    <line x1="165" y1="210" x2="245" y2="60"/>
    <line x1="165" y1="210" x2="245" y2="120"/>
    <line x1="165" y1="210" x2="245" y2="180"/>
    <line x1="165" y1="210" x2="245" y2="240"/>
  </g>

  <!-- connections h2->output -->
  <g stroke="#e74c3c" stroke-width="0.8" opacity="0.4">
    <line x1="255" y1="60"  x2="335" y2="115"/>
    <line x1="255" y1="60"  x2="335" y2="185"/>
    <line x1="255" y1="120" x2="335" y2="115"/>
    <line x1="255" y1="120" x2="335" y2="185"/>
    <line x1="255" y1="180" x2="335" y2="115"/>
    <line x1="255" y1="180" x2="335" y2="185"/>
    <line x1="255" y1="240" x2="335" y2="115"/>
    <line x1="255" y1="240" x2="335" y2="185"/>
  </g>

  <!-- Input nodes -->
  <g fill="#4a90d9">
    <circle cx="70" cy="80"  r="12"/>
    <circle cx="70" cy="150" r="12"/>
    <circle cx="70" cy="220" r="12"/>
  </g>

  <!-- Hidden layer 1 -->
  <g fill="#9b59b6">
    <circle cx="160" cy="60"  r="12"/>
    <circle cx="160" cy="110" r="12"/>
    <circle cx="160" cy="160" r="12"/>
    <circle cx="160" cy="210" r="12"/>
  </g>

  <!-- Hidden layer 2 -->
  <g fill="#8e44ad">
    <circle cx="250" cy="60"  r="12"/>
    <circle cx="250" cy="120" r="12"/>
    <circle cx="250" cy="180" r="12"/>
    <circle cx="250" cy="240" r="12"/>
  </g>

  <!-- Output nodes -->
  <g fill="#e74c3c">
    <circle cx="340" cy="115" r="14"/>
    <circle cx="340" cy="185" r="14"/>
  </g>

  <!-- Layer labels -->
  <g fill="#aaa" font-family="sans-serif" font-size="11" text-anchor="middle">
    <text x="70"  y="268">Input</text>
    <text x="160" y="268">Hidden</text>
    <text x="250" y="268">Hidden</text>
    <text x="340" y="268">Output</text>
  </g>
</svg>
